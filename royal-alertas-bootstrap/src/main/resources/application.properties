server.port=8085
spring.application.name=royal-alertas-api

# SQL Server productivo. Reemplazar valores por variables/secretos del entorno.
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=SGALERTASSYS;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USR:sa}
spring.datasource.password=${DB_PWD:YourStrongPassword!}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.datasource.hikari.pool-name=HikariPoolRoyalAlertas
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:30}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:60000}
spring.datasource.hikari.leak-detection-threshold=${DB_LEAK_DETECTION:60000}

royal.persistence.adapter=SQL_SERVER
royal.alertas.scheduler.enabled=${ALERTAS_SCHEDULER_ENABLED:false}
royal.alertas.scheduler.fixed-delay-ms=${ALERTAS_SCHEDULER_DELAY_MS:60000}

management.endpoints.web.exposure.include=health,info,metrics
