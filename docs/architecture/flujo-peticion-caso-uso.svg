<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1220" viewBox="0 0 1900 1220" role="img" aria-labelledby="title desc">
  <title id="title">Flujo de peticion en RRHH</title>
  <desc id="desc">Flujo actual de una peticion REST RRHH: filtros web, controller, contexto funcional, versionamiento, caso de uso, ports, adapters, base de datos y API de autenticacion.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .title { fill: #0b2b5c; font: 700 44px Arial, sans-serif; }
      .subtitle { fill: #486171; font: 400 22px Arial, sans-serif; }
      .band-title { fill: #0b2b5c; font: 700 21px Arial, sans-serif; }
      .box-title { fill: #0b2b5c; font: 700 19px Arial, sans-serif; }
      .text { fill: #243746; font: 400 16px Arial, sans-serif; }
      .small { fill: #486171; font: 400 14px Arial, sans-serif; }
      .tiny { fill: #486171; font: 400 12px Arial, sans-serif; }
      .layer { fill: #ffffff; stroke: #b7cad8; stroke-width: 2; rx: 16; }
      .box { fill: #ffffff; stroke: #2364aa; stroke-width: 2.2; rx: 10; }
      .box-blue { fill: #eef6ff; stroke: #2364aa; stroke-width: 2.2; rx: 10; }
      .box-green { fill: #effaf4; stroke: #248a50; stroke-width: 2.2; rx: 10; }
      .box-yellow { fill: #fff8e6; stroke: #c98116; stroke-width: 2.2; rx: 10; }
      .box-purple { fill: #f2f0ff; stroke: #6d4aff; stroke-width: 2.2; rx: 10; }
      .box-red { fill: #fff1f1; stroke: #b42318; stroke-width: 2.2; rx: 10; }
      .shadow { filter: drop-shadow(0 8px 18px rgba(11, 43, 92, 0.12)); }
      .arrow { stroke: #0b4d8b; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #6c8798; stroke-width: 3; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow-soft); }
      .return { stroke: #248a50; stroke-width: 4; fill: none; marker-end: url(#arrow-green); }
      .pill { fill: #0b2b5c; }
      .pill-text { fill: #ffffff; font: 700 15px Arial, sans-serif; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#0b4d8b"/>
    </marker>
    <marker id="arrow-soft" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#6c8798"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#248a50"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1900" height="1220"/>
  <text class="title" x="70" y="70">Flujo de peticion en RRHH</text>
  <text class="subtitle" x="70" y="106">Ejemplo: mantenimiento/reporte/aprobacion de parametros, tipo seguro, capacitacion o requerimiento</text>
  <rect class="layer shadow" x="55" y="145" width="1790" height="140"/>
  <text class="band-title" x="85" y="180">1. Entrada</text>
  <rect class="layer shadow" x="55" y="325" width="1790" height="190"/>
  <text class="band-title" x="85" y="360">2. API + seguridad web</text>
  <rect class="layer shadow" x="55" y="555" width="1790" height="245"/>
  <text class="band-title" x="85" y="590">3. Application</text>
  <rect class="layer shadow" x="55" y="840" width="1790" height="235"/>
  <text class="band-title" x="85" y="875">4. Infrastructure + datos</text>
  <rect class="box shadow" x="110" y="205" width="280" height="60"/>
  <text class="box-title" x="132" y="237">Usuario / sistema</text>
  <text class="text" x="132" y="265">Accion o integracion REST</text>
  <rect class="box shadow" x="495" y="190" width="450" height="90"/>
  <text class="box-title" x="517" y="222">Request HTTP</text>
  <text class="text" x="517" y="250">GET / POST / PUT / DELETE</text>
  <text class="text" x="517" y="275">X-Client-Id, X-User-Id, X-Api-Key</text>
  <rect class="box-blue shadow" x="1090" y="190" width="360" height="90"/>
  <text class="box-title" x="1112" y="222">Endpoint versionado</text>
  <text class="text" x="1112" y="250">/api/v1/hr/...</text>
  <text class="text" x="1112" y="275">Contratos OpenAPI en docs/openapi</text>
  <path class="arrow" d="M390 235 H485"/>
  <path class="arrow" d="M945 235 H1080"/>
  <rect class="box-yellow shadow" x="110" y="390" width="330" height="95"/>
  <text class="box-title" x="132" y="422">Filtros OWASP</text>
  <text class="text" x="132" y="450">API key, rate limit, CORS</text>
  <text class="text" x="132" y="475">Security headers</text>
  <rect class="box-blue shadow" x="520" y="380" width="330" height="110"/>
  <text class="box-title" x="542" y="412">Controller REST V1</text>
  <text class="text" x="542" y="440">Mapeo HTTP a Command/Query</text>
  <text class="text" x="542" y="465">@Valid y errores 400</text>
  <rect class="box-blue shadow" x="930" y="380" width="330" height="110"/>
  <text class="box-title" x="952" y="412">FunctionalContextFactory</text>
  <text class="text" x="952" y="440">Cliente, usuario, traceId</text>
  <text class="text" x="952" y="465">Idioma y version funcional</text>
  <rect class="box-blue shadow" x="1340" y="380" width="330" height="110"/>
  <text class="box-title" x="1362" y="412">RoyalResponse</text>
  <text class="text" x="1362" y="440">ResponseBodyAdvice</text>
  <text class="text" x="1362" y="465">GlobalApiExceptionHandler</text>
  <path class="arrow" d="M1270 280 C1270 325, 275 325, 275 380"/>
  <path class="arrow" d="M440 437 H510"/>
  <path class="arrow" d="M850 437 H920"/>
  <path class="arrow-soft" d="M1260 437 H1330"/>
  <rect class="box-green shadow" x="110" y="625" width="375" height="120"/>
  <text class="box-title" x="132" y="657">Use case V1/V2</text>
  <text class="text" x="132" y="685">MantenimientoTablaParametros</text>
  <text class="text" x="132" y="710">Reporte, aprobacion, TipoSeguro</text>
  <text class="text" x="132" y="735">Capacitacion, Requerimiento</text>
  <rect class="box-green shadow" x="555" y="610" width="345" height="150"/>
  <text class="box-title" x="577" y="642">RoyalBaseUseCase</text>
  <text class="text" x="577" y="670">Guards de licencia/permisos</text>
  <text class="text" x="577" y="695">Auditoria funcional</text>
  <text class="text" x="577" y="720">Errores de negocio controlados</text>
  <rect class="box-purple shadow" x="970" y="610" width="345" height="150"/>
  <text class="box-title" x="992" y="642">Version router</text>
  <text class="text" x="992" y="670">FunctionalVersionResolver</text>
  <text class="text" x="992" y="695">RoyalFunctionalVersionProxyFactory</text>
  <text class="text" x="992" y="720">catalogo XML por cliente/caso</text>
  <rect class="box-green shadow" x="1385" y="610" width="360" height="150"/>
  <text class="box-title" x="1407" y="642">Ports de salida</text>
  <text class="text" x="1407" y="670">Repository por caso de uso</text>
  <text class="text" x="1407" y="695">ConsultaPermisoPort</text>
  <text class="text" x="1407" y="720">Aprobaciones/Capacitacion ports</text>
  <path class="arrow" d="M1095 490 C1095 540, 297 540, 297 615"/>
  <path class="arrow" d="M485 682 H545"/>
  <path class="arrow-soft" d="M900 682 H960"/>
  <path class="arrow" d="M1315 682 H1375"/>
  <rect class="box-yellow shadow" x="110" y="910" width="330" height="120"/>
  <text class="box-title" x="132" y="942">Adapter seleccionado</text>
  <text class="text" x="132" y="970">royal.persistence.adapter</text>
  <text class="text" x="132" y="995">IN_MEMORY / SQL_SERVER / ORACLE</text>
  <text class="text" x="132" y="1020">Bean wiring en bootstrap</text>
  <rect class="box-purple shadow" x="500" y="895" width="330" height="150"/>
  <text class="box-title" x="522" y="927">Adapters JDBC</text>
  <text class="text" x="522" y="955">SQL Server y Oracle por version</text>
  <text class="text" x="522" y="980">JdbcTemplate + SQL resources</text>
  <text class="text" x="522" y="1005">Jasper para reportes</text>
  <rect class="box shadow" x="890" y="895" width="300" height="150"/>
  <text class="box-title" x="912" y="927">Base de datos</text>
  <text class="text" x="912" y="955">HR_Parametros</text>
  <text class="text" x="912" y="980">HR_TipoSeguro</text>
  <text class="text" x="912" y="1005">SQL Server u Oracle</text>
  <rect class="box-blue shadow" x="1250" y="895" width="300" height="150"/>
  <text class="box-title" x="1272" y="927">API Autenticacion</text>
  <text class="text" x="1272" y="955">ObtenerPermisoController</text>
  <text class="text" x="1272" y="980">X-Api-Key entre APIs</text>
  <rect class="box-green shadow" x="1610" y="895" width="205" height="150"/>
  <text class="box-title" x="1632" y="927">Retorno</text>
  <text class="text" x="1632" y="955">Result DTO</text>
  <text class="text" x="1632" y="980">HTTP 200/400/401/429/500</text>
  <path class="arrow" d="M1565 760 C1565 820, 275 820, 275 900"/>
  <path class="arrow" d="M440 970 H490"/>
  <path class="arrow" d="M830 970 H880"/>
  <path class="arrow-soft" d="M1565 682 C1600 760, 1440 830, 1400 885"/>
  <path class="return" d="M1190 1000 C1330 1060, 1500 1060, 1600 1000"/>
  <path class="return" d="M1550 970 H1600"/>
  <path class="return" d="M1712 895 C1712 790, 1765 790, 1765 437 C1765 350, 1665 350, 1545 380"/>
  <rect class="box-red shadow" x="110" y="1110" width="1705" height="70"/>
  <text class="box-title" x="140" y="1140">Regla clave</text>
  <text class="text" x="265" y="1140">El caso de uso solo habla con ports. El motor de BD, Jasper y la API de autenticacion quedan en Infrastructure/Framework.</text>
  <text class="small" x="265" y="1164">Los filtros web y RoyalResponse estandarizan seguridad, trazabilidad, respuestas y errores antes/despues del caso de uso.</text>
</svg>