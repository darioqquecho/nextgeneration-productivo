  <text class="text" x="597" y="840">royal.persistence.adapter</text>
  <text class="text" x="597" y="865">client-catalog.xml, functional-version-catalog.xml</text>
  <text class="text" x="597" y="890">JAR, WAR, Docker, Kubernetes</text>
