  <rect class="layer shadow" x="1615" y="335" width="430" height="620"/>
  <text class="band-title" x="1645" y="375">Persistencia e integraciones</text>
  <rect class="box-purple shadow" x="1655" y="415" width="350" height="100"/>
  <text class="box-title" x="1677" y="447">Adapter configurable</text>
  <text class="text" x="1677" y="475">IN_MEMORY, SQL_SERVER, ORACLE</text>
  <text class="text" x="1677" y="500">Resuelto en bootstrap por propiedad</text>
