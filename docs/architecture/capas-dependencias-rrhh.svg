  <text class="tiny" x="1855" y="812">-infrastructure</text>
  <text class="tiny" x="1855" y="856">royal-rrhh-api</text>
  <text class="tiny" x="1855" y="900">royal-rrhh</text>
  <text class="tiny" x="1855" y="916">-bootstrap/war</text>
  <g stroke="#082f6f" stroke-width="2" fill="#082f6f">
