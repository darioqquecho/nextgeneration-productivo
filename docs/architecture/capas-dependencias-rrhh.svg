  <text class="box-title" x="542" y="237">Filtros web compartidos</text>
  <text class="text" x="542" y="265">ApiKeyAuthenticationFilter</text>
  <text class="text" x="542" y="290">RateLimitFilter, CORS, security headers</text>
  <rect class="box-blue shadow" x="995" y="205" width="415" height="85"/>
