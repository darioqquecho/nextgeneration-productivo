  <text class="label-sm" x="1512" y="865">SQL Server</text>

  <rect class="box-db shadow" x="1640" y="825" width="160" height="65"/>
  <g transform="translate(1660 840)" stroke="#082f6f" stroke-width="2.5" fill="none">
    <ellipse cx="18" cy="8" rx="18" ry="8"/>
    <path d="M0 8 V36 C0 46,36 46,36 36 V8"/>
    <path d="M0 22 C0 32,36 32,36 22"/>
  </g>
  <text class="label-sm" x="1722" y="865">Oracle</text>

  <!-- External auth API -->
  <rect class="box-orange shadow" x="1090" y="790" width="310" height="105"/>
  <text class="label-sm" x="1120" y="823">API Autenticacion</text>
  <text class="small" x="1120" y="851">&#8226; obtenerpermiso</text>
  <text class="small" x="1120" y="877">&#8226; X-Api-Key entre APIs</text>

  <!-- Rules -->
  <rect class="box shadow" x="1835" y="105" width="140" height="427"/>
  <rect class="box-dark" x="1835" y="105" width="140" height="60"/>
  <text class="rule-title" x="1858" y="142">Reglas</text>
  <g>
    <circle cx="1860" cy="200" r="15" fill="#082f6f"/><text class="num" x="1855" y="205">1</text>
    <text class="small" x="1884" y="196">API -&gt;</text><text class="small" x="1884" y="216">Application</text>
    <circle cx="1860" cy="257" r="15" fill="#082f6f"/><text class="num" x="1855" y="262">2</text>
    <text class="small" x="1884" y="253">Application</text><text class="small" x="1884" y="273">-&gt; Domain</text>
    <circle cx="1860" cy="314" r="15" fill="#082f6f"/><text class="num" x="1855" y="319">3</text>
    <text class="small" x="1884" y="309">Infrastructure</text><text class="small" x="1884" y="329">implementa ports</text>
    <circle cx="1860" cy="382" r="15" fill="#082f6f"/><text class="num" x="1855" y="387">4</text>
    <text class="small" x="1884" y="378">Bootstrap</text><text class="small" x="1884" y="398">wiring global</text>
    <circle cx="1860" cy="449" r="15" fill="#082f6f"/><text class="num" x="1855" y="454">5</text>
    <text class="small" x="1884" y="445">SQL y Oracle</text><text class="small" x="1884" y="465">SQL separados</text>
    <circle cx="1860" cy="501" r="15" fill="#082f6f"/><text class="num" x="1855" y="506">6</text>
    <text class="small" x="1884" y="497">Domain sin</text><text class="small" x="1884" y="517">Spring/JDBC</text>
  </g>

