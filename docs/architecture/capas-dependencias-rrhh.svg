  <rect class="box shadow" x="1835" y="560" width="140" height="360"/>
  <rect class="box-dark" x="1835" y="560" width="140" height="60"/>
  <text class="rule-title" x="1852" y="590">RRHH</text>
  <text class="rule-title" x="1852" y="612">Maven</text>
  <text class="tiny" x="1855" y="652">royal-rrhh</text>
  <text class="tiny" x="1855" y="676">-domain</text>
  <text class="tiny" x="1855" y="720">royal-rrhh</text>
