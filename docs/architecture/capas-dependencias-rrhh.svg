<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1100" viewBox="0 0 2000 1100" role="img" aria-labelledby="title desc">
  <title id="title">Capas y dependencias del modulo RRHH</title>
  <desc id="desc">Diagrama de arquitectura RRHH con API, Application, Domain, Infrastructure, Bootstrap, framework compartido, adapters SQL Server Oracle InMemory, recursos SQL separados, seguridad OWASP, multicliente y llamadas REST entre modulos.</desc>
  <defs>
    <style>
      .bg { fill: #f8fbff; }
      .title { fill: #09285c; font: 700 48px Arial, sans-serif; }
      .subtitle { fill: #4a4f57; font: 400 24px Arial, sans-serif; }
      .box { fill: #ffffff; stroke: #0b65c2; stroke-width: 2.2; rx: 12; }
      .box-soft { fill: #f3f8ff; stroke: #0b65c2; stroke-width: 2.2; rx: 12; }
      .box-green { fill: #f1fff8; stroke: #087a57; stroke-width: 2.2; rx: 10; }
      .box-orange { fill: #fff8ed; stroke: #c46a00; stroke-width: 2.2; rx: 10; }
      .box-dark { fill: #082f6f; stroke: #082f6f; stroke-width: 2.2; rx: 10; }
      .box-db { fill: #f7f9ff; stroke: #082f6f; stroke-width: 2.2; rx: 10; }
      .label { fill: #09285c; font: 700 27px Arial, sans-serif; }
      .label-sm { fill: #09285c; font: 700 18px Arial, sans-serif; }
      .label-green { fill: #065f46; font: 700 16px Arial, sans-serif; }
      .text { fill: #111827; font: 400 18px Arial, sans-serif; }
      .small { fill: #111827; font: 400 15px Arial, sans-serif; }
      .tiny { fill: #374151; font: 400 13px Arial, sans-serif; }
      .white { fill: #ffffff; font: 700 21px Arial, sans-serif; }
      .rule-title { fill: #ffffff; font: 700 20px Arial, sans-serif; }
      .num { fill: #ffffff; font: 700 15px Arial, sans-serif; }
      .arrow { stroke: #082f6f; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .arrow-thin { stroke: #082f6f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .arrow-dash { stroke: #0074cc; stroke-width: 3; fill: none; stroke-dasharray: 7 8; marker-end: url(#arrow-blue); }
      .arrow-green { stroke: #087a57; stroke-width: 4; fill: none; marker-end: url(#arrow-green); }
      .arrow-gray { stroke: #5d6b7c; stroke-width: 2.4; fill: none; stroke-dasharray: 4 6; marker-end: url(#arrow-gray); }
      .shadow { }
      .divider { stroke: #72a8dc; stroke-width: 2; }
      .line { stroke: #b7c7d8; stroke-width: 2; }
      .dash-outline { fill: #ffffff; stroke: #087a57; stroke-width: 2; stroke-dasharray: 6 6; rx: 10; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#082f6f"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#0074cc"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#087a57"/>
    </marker>
    <marker id="arrow-gray" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#5d6b7c"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="2000" height="1100"/>
  <text class="title" x="430" y="58">Capas y dependencias del modulo RRHH</text>
  <text class="subtitle" x="545" y="92">Clean Architecture pragmatica + Arquitectura Hexagonal + Maven Modules</text>

  <!-- Clientes -->
  <rect class="box shadow" x="390" y="115" width="640" height="78"/>
  <g transform="translate(430 137)" stroke="#082f6f" stroke-width="3" fill="none">
    <circle cx="18" cy="18" r="10"/>
    <circle cx="48" cy="18" r="10"/>
    <circle cx="78" cy="18" r="10"/>
    <path d="M5 52 C8 36, 28 36, 31 52"/>
    <path d="M35 52 C38 36, 58 36, 61 52"/>
    <path d="M65 52 C68 36, 88 36, 91 52"/>
    <circle cx="48" cy="48" r="15"/>
    <path d="M33 48 H63 M48 33 V63"/>
  </g>
  <text class="label" x="545" y="162">Clientes / Frontend / Sistemas externos</text>

  <!-- Bootstrap -->
  <rect class="box shadow" x="20" y="335" width="240" height="320"/>
  <g transform="translate(48 368)" stroke="#0074cc" stroke-width="3" fill="none">
    <path d="M35 0 h28 v20 h18 v28 h-18 v20 h-28 v-20 h-18 v-28 h18 z"/>
    <circle cx="49" cy="34" r="10"/>
  </g>
  <text class="label" x="116" y="405">Bootstrap</text>
  <text class="text" x="42" y="465">&#8226; Spring Boot wiring</text>
  <text class="text" x="42" y="500">&#8226; Profiles y propiedades</text>
  <text class="text" x="42" y="535">&#8226; persistence.adapter</text>
  <text class="text" x="42" y="570">&#8226; client-catalog.xml</text>
  <text class="text" x="42" y="605">&#8226; JAR / WAR Tomcat</text>
  <text class="text" x="42" y="640">&#8226; Docker / Kubernetes</text>

  <!-- API -->
  <rect class="box-soft shadow" x="390" y="230" width="640" height="158"/>
  <g transform="translate(425 277)" stroke="#082f6f" stroke-width="3" fill="none">
    <path d="M15 45 C0 42,-2 15,22 17 C27 2,52 0,60 20 C80 14,98 29,91 52 H18"/>
    <circle cx="55" cy="58" r="19"/>
    <path d="M36 58 H74 M55 39 V77 M43 46 C52 53,58 53,67 46 M43 70 C52 63,58 63,67 70"/>
  </g>
  <line class="divider" x1="522" y1="262" x2="522" y2="356"/>
  <text class="label" x="555" y="320">API</text>
  <text class="text" x="700" y="255">&#8226; Controllers REST V1</text>
  <text class="text" x="700" y="283">&#8226; DTOs HTTP con @Valid</text>
  <text class="text" x="700" y="311">&#8226; Manejo estandar de errores</text>
  <text class="text" x="700" y="339">&#8226; OpenAPI</text>
  <text class="text" x="700" y="367">&#8226; /api/v1/hr/maestros/*</text>

  <!-- Seguridad web -->
  <rect class="box-orange shadow" x="1080" y="238" width="315" height="142"/>
  <text class="label-sm" x="1110" y="270">Filtros Web / OWASP</text>
  <text class="small" x="1110" y="300">&#8226; ApiKeyAuthenticationFilter</text>
  <text class="small" x="1110" y="326">&#8226; SecurityHeadersFilter</text>
  <text class="small" x="1110" y="352">&#8226; RateLimitFilter + CORS</text>

  <!-- Application -->
  <rect class="box-soft shadow" x="390" y="430" width="640" height="170"/>
  <g transform="translate(430 466)" stroke="#082f6f" stroke-width="3" fill="none">
    <circle cx="43" cy="42" r="22"/>
    <path d="M43 8 V0 M43 84 V76 M9 42 H0 M86 42 H77 M19 18 L12 11 M68 66 L75 73 M67 18 L74 11 M19 66 L12 73"/>
    <path d="M25 94 H61 M43 64 V94 M19 112 H67 M19 112 V94 M67 112 V94"/>
  </g>
  <line class="divider" x1="522" y1="462" x2="522" y2="565"/>
  <text class="label" x="555" y="518">Application</text>
  <text class="text" x="720" y="455">&#8226; Use cases V1 / V2</text>
  <text class="text" x="720" y="483">&#8226; Funcionalidades por caso de uso</text>
  <text class="text" x="720" y="511">&#8226; Commands / Queries / Results</text>
  <text class="text" x="720" y="539">&#8226; Ports por caso de uso</text>
  <text class="text" x="720" y="567">&#8226; FunctionalContext y permisos</text>
  <text class="small" x="720" y="592">Ej: MantenimientoTipoSeguroV1UseCase</text>

  <!-- Base classes -->
  <rect class="dash-outline shadow" x="1080" y="423" width="335" height="184"/>
  <text class="label-green" x="1110" y="454">Base comun de casos de uso</text>
  <text class="small" x="1110" y="482">&#8226; RoyalBaseUseCase</text>
  <text class="small" x="1110" y="508">&#8226; RoyalFunctionalVersionProxyFactory</text>
  <text class="small" x="1110" y="534">&#8226; RoyalUseCaseObservabilityPostProcessor</text>
  <text class="small" x="1110" y="560">&#8226; FunctionalVersionResolver</text>
  <text class="small" x="1110" y="586">&#8226; Audit, license, guards, logs</text>

  <!-- Port -->
  <rect class="box-green shadow" x="1090" y="640" width="310" height="120"/>
  <g transform="translate(1120 660)" stroke="#087a57" stroke-width="3" fill="none">
    <path d="M25 50 C0 38,3 12,25 7 C47 12,50 38,25 50 Z"/>
    <path d="M25 7 V0 M10 17 L0 8 M40 17 L50 8 M25 50 V70 M10 70 H40"/>
  </g>
  <text class="label-green" x="1190" y="678">Port / Repository</text>
  <text class="label-green" x="1190" y="704">Interface</text>
  <text class="small" x="1120" y="735">El use case usa puertos;</text>
  <text class="small" x="1120" y="758">no conoce el motor de BD.</text>

  <!-- Domain -->
  <rect class="box-soft shadow" x="390" y="640" width="640" height="170"/>
  <g transform="translate(430 678)" stroke="#082f6f" stroke-width="3" fill="none">
    <path d="M42 0 L82 23 L82 69 L42 92 L2 69 L2 23 Z"/>
    <path d="M2 23 L42 46 L82 23 M42 46 V92"/>
    <path d="M22 12 L62 35"/>
  </g>
  <line class="divider" x1="522" y1="672" x2="522" y2="775"/>
  <text class="label" x="555" y="728">Domain</text>
  <text class="text" x="720" y="665">&#8226; Entidades y Value Objects</text>
  <text class="text" x="720" y="693">&#8226; Reglas de negocio</text>
  <text class="text" x="720" y="721">&#8226; Parametro / TipoSeguro</text>
  <text class="text" x="720" y="749">&#8226; Capacitacion / Requerimiento</text>
  <text class="text" x="720" y="777">&#8226; Sin Spring ni JDBC</text>

  <!-- Infrastructure -->
  <rect class="box-soft shadow" x="1460" y="347" width="295" height="280"/>
  <g transform="translate(1490 377)" stroke="#082f6f" stroke-width="3" fill="none">
    <rect x="0" y="0" width="56" height="24" rx="4"/>
    <rect x="0" y="34" width="56" height="24" rx="4"/>
    <rect x="0" y="68" width="56" height="24" rx="4"/>
    <circle cx="12" cy="12" r="2"/><circle cx="12" cy="46" r="2"/><circle cx="12" cy="80" r="2"/>
  </g>
  <text class="label" x="1567" y="409">Infrastructure</text>
  <text class="text" x="1493" y="455">&#8226; Adapters</text>
  <text class="text" x="1493" y="483">&#8226; Repositorios JDBC</text>
  <text class="text" x="1493" y="511">&#8226; JdbcTemplate</text>
  <text class="text" x="1493" y="539">&#8226; SQL Server Adapter</text>
  <text class="text" x="1493" y="567">&#8226; Oracle Adapter</text>
  <text class="text" x="1493" y="595">&#8226; InMemory solo demo/test</text>
  <text class="text" x="1493" y="623">&#8226; RestApiClient</text>

  <!-- SQL resources -->
  <rect class="box-db shadow" x="1430" y="682" width="180" height="105"/>
  <g transform="translate(1450 702)" stroke="#082f6f" stroke-width="2.5" fill="none">
    <path d="M12 0 H34 L50 16 V62 H12 Z"/>
    <path d="M34 0 V16 H50"/>
    <path d="M20 30 H42 M20 42 H42 M20 54 H36"/>
  </g>
  <text class="label-sm" x="1512" y="716">SQL Server</text>
  <text class="small" x="1450" y="756">sql/hr/maestros/*</text>

  <rect class="box-db shadow" x="1630" y="682" width="180" height="105"/>
  <g transform="translate(1650 702)" stroke="#082f6f" stroke-width="2.5" fill="none">
    <path d="M12 0 H34 L50 16 V62 H12 Z"/>
    <path d="M34 0 V16 H50"/>
    <path d="M20 30 H42 M20 42 H42 M20 54 H36"/>
  </g>
  <text class="label-sm" x="1713" y="716">Oracle</text>
  <text class="small" x="1650" y="756">oracle/hr/maestros/*</text>

  <!-- Databases -->
  <rect class="box-db shadow" x="1440" y="825" width="160" height="65"/>
  <g transform="translate(1460 840)" stroke="#082f6f" stroke-width="2.5" fill="none">
