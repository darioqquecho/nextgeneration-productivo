server.port=8080
spring.application.name=royal-rrhh-api

royal.persistence.adapter=IN_MEMORY

spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:}

royal.functional-version.default=V1
royal.functional-version.catalog=classpath:functional-version-catalog.xml
royal.client.catalog=${ROYAL_CLIENT_CATALOG:classpath:client-catalog.xml}

royal.context.default-tenant=${ROYAL_DEFAULT_TENANT:default}
royal.context.default-client=${ROYAL_DEFAULT_CLIENT:demo-client}
royal.context.default-user=${ROYAL_DEFAULT_USER:admin}

royal.autenticacion.base-url=${ROYAL_AUTENTICACION_BASE_URL:http://localhost:8080}

royal.security.api-key.enabled=${ROYAL_SECURITY_API_KEY_ENABLED:true}
royal.security.api-key.value=${ROYAL_SECURITY_API_KEY:dev-change-me}
royal.security.api-key.header=X-Api-Key
royal.security.public-paths=/actuator/health,/actuator/info
royal.security.rate-limit.enabled=${ROYAL_SECURITY_RATE_LIMIT_ENABLED:true}
royal.security.rate-limit.requests-per-minute=${ROYAL_SECURITY_RATE_LIMIT_RPM:120}
royal.security.cors.allowed-origins=${ROYAL_SECURITY_CORS_ORIGINS:}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
