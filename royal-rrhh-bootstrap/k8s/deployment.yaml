apiVersion: apps/v1
kind: Deployment
metadata:
  name: royal-rrhh-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: royal-rrhh-api
  template:
    metadata:
      labels:
        app: royal-rrhh-api
    spec:
      containers:
        - name: royal-rrhh-api
          image: royal-rrhh-api:1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: ROYAL_PERSISTENCE_ADAPTER
              value: IN_MEMORY
            - name: ROYAL_AUTENTICACION_BASE_URL
              value: http://royal-autenticacion-api:8080
            - name: ROYAL_DEFAULT_TENANT
              value: default
            - name: ROYAL_DEFAULT_CLIENT
              value: demo-client
            - name: ROYAL_DEFAULT_USER
              value: admin
            - name: ROYAL_CLIENT_CATALOG
              value: file:/etc/royal/rrhh/client-catalog.xml
            - name: ROYAL_SECURITY_API_KEY_ENABLED
              value: "true"
            - name: ROYAL_SECURITY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: royal-api-security
                  key: api-key
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: royal-rrhh-db
                  key: url
                  optional: true
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: royal-rrhh-db
                  key: username
                  optional: true
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: royal-rrhh-db
                  key: password
                  optional: true
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              valueFrom:
                secretKeyRef:
                  name: royal-rrhh-db
                  key: driver-class-name
                  optional: true
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
          volumeMounts:
            - name: client-catalog
              mountPath: /etc/royal/rrhh
              readOnly: true
      volumes:
        - name: client-catalog
          configMap:
            name: royal-rrhh-client-catalog
---
apiVersion: v1
kind: Service
metadata:
  name: royal-rrhh-api
spec:
  selector:
    app: royal-rrhh-api
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: royal-rrhh-client-catalog
data:
  client-catalog.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <client-catalog>
      <client tenantId="default" clientId="demo-client">
        <module code="HR"/>
        <property name="persistence.adapter" value="IN_MEMORY"/>
      </client>
      <client tenantId="tenant-acme" clientId="acme">
        <module code="HR"/>
        <property name="persistence.adapter" value="SQL_SERVER"/>
      </client>
      <client tenantId="tenant-contoso" clientId="contoso">
        <module code="HR"/>
        <property name="persistence.adapter" value="ORACLE"/>
      </client>
    </client-catalog>
---
apiVersion: v1
kind: Secret
metadata:
  name: royal-api-security
type: Opaque
stringData:
  api-key: change-this-api-key
